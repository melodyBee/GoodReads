<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <link rel="shortcut icon" href="./assets/goodreads-icon.svg" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap"
            rel="stylesheet"
        />
        <title>Goodreads</title>
    </head>
    <body>
        <div class="banner">
            <img src="./assets/books(1).png" alt="" class="banner-image" />
            <h1 class="main-text-banner">Big Books Of Spring</h1>
            <span class="description-text-banner"
                >Discover readers' most anticipated spring titles</span
            >
            <img src="./assets/chevron.png" alt="" class="banner-arrow" />
        </div>
        <div class="body">
            <nav>
                <img class="logo" src="./assets/goodreads_logo-removebg-preview.png" alt="" />
                <a href="">Home</a>
                <a href="">My Books</a>
                <a href=""
                    >Browse <img class="down-arrow" src="./assets/downward-arrow.png" alt=""
                /></a>
                <a href=""
                    >Community <img class="down-arrow" src="./assets/downward-arrow.png" alt=""
                /></a>
                <div class="search-bar">
                    <input type="text" placeholder="Search books" />
                    <img class="search-icon" src="./assets/search.png" alt="" />
                </div>
                <img class="icon-nav" src="./assets/notification.png" alt="" />
                <img class="icon-nav" src="./assets/conversation.png" alt="" />
                <img class="icon-nav" src="./assets/email.png" alt="" />
                <img class="icon-nav" src="./assets/group.png" alt="" />
                <img class="icon-nav" src="" alt="profile" />
            </nav>
            <div class="personal-stats">
                <h1>CURRENTLY READING</h1>
                <div class="book">
                    <div class="book-image"><img src="./assets/little-stranger.jpg" alt="" /></div>
                    <div class="dets">
                        <h2>Little Stranger (The Web of Silence Due...</h2>
                        <span>by Leigh Rivers</span>
                        <div class="progress">
                            <div class="progress-bar"></div>
                            <span>54%</span>
                        </div>
                        <button>Update progress</button>
                    </div>
                </div>
                <div class="book">
                    <div class="book-image">
                        <img src="./assets/A-thousand-splendid-suns.jpg" alt="" />
                    </div>
                    <div class="dets">
                        <h2>A Thousand Splendid Suns</h2>
                        <span>by Khaled Hosseini</span>
                        <div class="progress">
                            <div class="progress-bar"></div>
                            <span>54%</span>
                        </div>
                        <button>Update progress</button>
                    </div>
                </div>
            </div>
            <div class="feed"></div>
            <div class="recs"></div>
        </div>
    </body>
</html>
